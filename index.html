<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title id="pageTitle">Mangasal</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Mulish:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--red:#d4500a;--gold:#e87c1e;--dark:#0d0805;--card:#150e08;--text:#e0e0e0;--muted:#888;--bdr:rgba(212,80,10,.15)}
body{background:var(--dark);color:var(--text);font-family:'Mulish',sans-serif;min-height:100vh}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:#0d0805}
::-webkit-scrollbar-thumb{background:#6b2800;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--red)}
nav{display:flex;align-items:center;gap:0;padding:0 48px;height:62px;background:rgba(13,8,5,.97);backdrop-filter:blur(10px);position:sticky;top:0;z-index:200;border-bottom:1px solid var(--bdr)}
.nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none;flex-shrink:0;margin-right:28px}
.nav-logo span{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:3px;color:#fff}
.nav-logo span em{color:var(--red);font-style:normal}
nav ul{display:flex;gap:24px;list-style:none;flex:1}
nav ul a{color:var(--muted);text-decoration:none;font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;transition:.2s;cursor:pointer}
nav ul a:hover,nav ul a.active{color:#fff}
.nav-right{display:flex;align-items:center;gap:12px;flex-shrink:0}
.nav-search{position:relative;z-index:300}
.nav-search input{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);color:var(--text);padding:7px 14px 7px 34px;font-size:12px;font-family:'Mulish',sans-serif;border-radius:3px;outline:none;width:240px;transition:.2s}
.nav-search input:focus{border-color:rgba(212,80,10,.45);background:rgba(255,255,255,.08)}
.nav-search input::placeholder{color:var(--muted)}
.nav-search .si{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:13px;pointer-events:none}
.search-dropdown{position:absolute;top:calc(100% + 6px);left:0;right:0;background:#1a0e08;border:1px solid rgba(212,80,10,.4);border-radius:4px;z-index:9999;max-height:360px;overflow-y:auto;box-shadow:0 8px 24px rgba(0,0,0,.5);display:none}
.search-dropdown.open{display:block}
.sdrop-item{display:flex;align-items:center;gap:10px;padding:10px 12px;cursor:pointer;transition:.12s;border-bottom:1px solid rgba(255,255,255,.04)}
.sdrop-item:last-child{border-bottom:none}
.sdrop-item:hover{background:rgba(212,80,10,.12)}
.sdrop-thumb{width:32px;height:44px;border-radius:2px;flex-shrink:0;background:#150e08;border:1px solid rgba(255,255,255,.07);display:flex;align-items:center;justify-content:center;font-size:14px;overflow:hidden}
.sdrop-thumb img{width:100%;height:100%;object-fit:cover}
.sdrop-info{flex:1;min-width:0}
.sdrop-title{font-size:12px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sdrop-meta{font-size:10px;color:var(--muted);margin-top:1px}
.sdrop-type{font-size:8px;font-weight:700;padding:2px 6px;border-radius:2px;flex-shrink:0}
.sdrop-type.manhwa{background:rgba(232,124,30,.15);color:#e87c1e}
.sdrop-type.manga{background:rgba(255,165,0,.15);color:#ffa500}
.sdrop-type.manhua{background:rgba(155,93,229,.15);color:#9b5de5}
.sdrop-empty{padding:14px;text-align:center;color:var(--muted);font-size:11px}
.nav-btn{background:linear-gradient(135deg,var(--red),#a83000);color:#fff;border:none;padding:7px 18px;border-radius:3px;font-size:12px;font-weight:700;cursor:pointer;letter-spacing:.5px}
.user-menu-wrap{position:relative}
.user-avatar{width:34px;height:34px;border-radius:50%;background:var(--red);border:2px solid rgba(212,80,10,.4);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;overflow:hidden;transition:.15s}
.user-avatar:hover{border-color:var(--red)}
.user-avatar img{width:100%;height:100%;object-fit:cover}
.user-dropdown{position:absolute;top:calc(100% + 8px);right:0;background:#1a0e08;border:1px solid var(--bdr);border-radius:4px;width:200px;z-index:300;display:none}
.user-dropdown.open{display:block}
.ud-header{padding:12px 14px;border-bottom:1px solid rgba(255,255,255,.06)}
.ud-name{font-size:13px;font-weight:700;color:#fff;margin-bottom:2px}
.ud-role{font-size:10px;font-weight:700;letter-spacing:.5px}
.ud-item{display:flex;align-items:center;gap:9px;padding:9px 14px;cursor:pointer;font-size:12px;color:var(--muted);transition:.12s}
.ud-item:hover{color:#fff;background:rgba(212,80,10,.06)}
.ud-item.danger{color:#f87171}
.ud-item.danger:hover{background:rgba(255,50,50,.06)}
.ud-divider{border-top:1px solid rgba(255,255,255,.06);margin:4px 0}
.avatar-upload-wrap{position:relative;cursor:pointer}
.avatar-upload-wrap:hover .avatar-overlay{opacity:1}
.avatar-overlay{position:absolute;inset:0;background:rgba(0,0,0,.6);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;opacity:0;transition:.2s}
.roles-stack{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.role-badge{font-size:9px;font-weight:700;padding:2px 8px;border-radius:10px;letter-spacing:.5px}
.role-badge-Yeni{background:rgba(136,136,136,.15);color:#888}
.role-badge-Deneyimli{background:rgba(96,165,250,.15);color:#60a5fa}
.role-badge-Uzman{background:rgba(52,211,153,.15);color:#34d399}
.role-badge-Efsane{background:rgba(251,191,36,.15);color:#fbbf24}
.role-badge-Admin{background:rgba(248,113,113,.15);color:#f87171}
.role-badge-custom{background:rgba(212,80,10,.15);color:#e87c1e}
.type-tabs{display:flex;padding:0 48px;background:rgba(13,8,5,.85);border-bottom:1px solid rgba(212,80,10,.1)}
.tab{padding:11px 18px;font-size:11px;font-weight:700;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;cursor:pointer;border-bottom:2px solid transparent;transition:.15s;margin-bottom:-1px}
.tab:hover{color:var(--text)}
.tab.active{color:var(--gold);border-bottom-color:var(--red)}
.tab-badge{display:inline-block;background:rgba(212,80,10,.2);color:var(--gold);font-size:8px;padding:1px 5px;border-radius:2px;margin-left:4px}
.src-row{padding:8px 48px;background:rgba(13,8,5,.6);border-bottom:1px solid rgba(212,80,10,.08);display:flex;align-items:center;gap:10px}
.src-label{font-size:10px;color:var(--muted);font-weight:700;letter-spacing:1px;text-transform:uppercase}
.src-btn{border:1px solid rgba(255,255,255,.1);color:var(--muted);padding:4px 12px;font-size:10px;font-weight:700;cursor:pointer;background:transparent;border-radius:2px;transition:.15s;text-transform:uppercase}
.src-btn:hover,.src-btn.active{border-color:var(--red);color:var(--red);background:rgba(212,80,10,.06)}
.hero{position:relative;min-height:75vh;overflow:hidden;display:flex;align-items:flex-end}
.hero-slides{position:absolute;inset:0;display:flex;transition:none}
.hero-slide{flex-shrink:0;width:100%;height:100%;position:relative;overflow:hidden}
.hero-slide-bg{position:absolute;inset:0;background-size:cover;background-position:center;transition:.5s}
.hero-slide-overlay{position:absolute;inset:0;background:linear-gradient(to right,rgba(13,8,5,.95) 0%,rgba(13,8,5,.6) 50%,transparent 100%)}
.hero-slide-overlay2{position:absolute;inset:0;background:linear-gradient(to top,rgba(13,8,5,.8) 0%,transparent 60%)}
.hero-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(212,80,10,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(212,80,10,.05) 1px,transparent 1px);background-size:60px 60px;opacity:.6}
.hero-glow{position:absolute;right:-50px;top:40%;transform:translateY(-50%);width:500px;height:500px;background:radial-gradient(circle,rgba(212,80,10,.1) 0%,transparent 70%);pointer-events:none}
.hero-content{position:relative;z-index:2;padding:0 48px 64px;max-width:580px}
.hero-badge{display:inline-block;background:rgba(212,80,10,.18);border:1px solid rgba(212,80,10,.35);color:var(--gold);font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:5px 12px;border-radius:2px;margin-bottom:18px}
.hero h1{font-family:'Bebas Neue',sans-serif;font-size:72px;line-height:.95;letter-spacing:2px;margin-bottom:14px;color:#fff}
.hero h1 span{color:var(--red)}
.hero p{color:var(--muted);font-size:14px;line-height:1.75;max-width:400px;margin-bottom:28px}
.hero-btns{display:flex;gap:12px}
.btn-primary{background:linear-gradient(135deg,var(--red),#a83000);color:#fff;border:none;padding:12px 28px;font-size:13px;font-weight:700;border-radius:3px;cursor:pointer;box-shadow:0 2px 12px rgba(212,80,10,.3)}
.btn-secondary{background:transparent;color:#fff;border:1px solid rgba(255,255,255,.2);padding:12px 28px;font-size:13px;font-weight:600;border-radius:3px;cursor:pointer}
.hero-stats{position:absolute;right:48px;bottom:64px;z-index:2;display:flex;gap:40px}
.stat-item{text-align:right}
.stat-num{font-family:'Bebas Neue',sans-serif;font-size:38px;color:var(--gold);line-height:1}
.stat-label{font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase}
.slider-dots{position:absolute;bottom:20px;left:48px;z-index:3;display:flex;gap:7px}
.slider-dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.25);cursor:pointer;transition:.2s}
.slider-dot.on{background:var(--red);width:20px;border-radius:4px}
.slider-arrows{position:absolute;right:48px;top:50%;transform:translateY(-50%);z-index:3;display:flex;gap:8px}
.slider-arrow{width:36px;height:36px;background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.15);color:#fff;cursor:pointer;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;transition:.15s}
.slider-arrow:hover{background:rgba(212,80,10,.4);border-color:var(--red)}
.section{padding:48px 48px 0}
.section-header{display:flex;align-items:center;gap:16px;margin-bottom:24px}
.section-title{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;color:#fff;flex-shrink:0}
.section-line{flex:1;height:1px;background:linear-gradient(to right,rgba(212,80,10,.3),transparent)}
.section-more{color:var(--red);font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;flex-shrink:0}
.manga-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:14px}
.manga-card{position:relative;cursor:pointer;border-radius:4px;overflow:hidden;aspect-ratio:2/3;background:var(--card);border:1px solid rgba(212,80,10,.08);transition:.2s}
.manga-card:hover{border-color:rgba(212,80,10,.5);transform:translateY(-3px);box-shadow:0 4px 20px rgba(212,80,10,.15)}
.manga-card img{width:100%;height:100%;object-fit:cover;transition:transform .4s}
.manga-card:hover img{transform:scale(1.06)}
.manga-card-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:42px}
.manga-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.92) 0%,transparent 55%);opacity:0;transition:.3s}
.manga-card:hover .manga-overlay{opacity:1}
.manga-info{position:absolute;bottom:0;left:0;right:0;padding:10px;transform:translateY(6px);opacity:0;transition:.3s}
.manga-card:hover .manga-info{transform:translateY(0);opacity:1}
.manga-title{font-size:11px;font-weight:700;line-height:1.3;margin-bottom:3px;color:#fff}
.manga-meta{font-size:9px;color:rgba(255,255,255,.6)}
.manga-badge{position:absolute;top:7px;left:7px;background:linear-gradient(135deg,var(--red),#a83000);color:#fff;font-size:8px;font-weight:700;letter-spacing:1px;padding:2px 6px;border-radius:2px;text-transform:uppercase}
.manga-badge.gold{background:linear-gradient(135deg,var(--gold),#c05a00);color:#fff}
.manga-badge.new{background:linear-gradient(135deg,#2d6a4f,#1a4a30);color:#fff}
.manga-type{position:absolute;top:7px;right:7px;font-size:8px;font-weight:700;padding:2px 5px;border-radius:2px}
.manga-type.manhwa{background:rgba(232,124,30,.12);color:#e87c1e}
.manga-type.manga{background:rgba(255,165,0,.15);color:#ffa500}
.manga-type.manhua{background:rgba(155,93,229,.15);color:#9b5de5}
.manga-rank{position:absolute;bottom:7px;right:7px;font-family:'Bebas Neue',sans-serif;font-size:32px;color:rgba(212,80,10,.2);line-height:1}
.fav-btn{position:absolute;top:7px;left:7px;width:24px;height:24px;background:rgba(0,0,0,.6);border:none;border-radius:50%;cursor:pointer;font-size:12px;display:none;align-items:center;justify-content:center;z-index:5;transition:.15s}
.manga-card:hover .fav-btn{display:flex}
.fav-btn:hover{background:rgba(212,80,10,.6);transform:scale(1.1)}
.updates-wrap{display:grid;grid-template-columns:1fr 1fr;gap:0;border:1px solid rgba(212,80,10,.1);border-radius:4px;overflow:hidden}
.upd-item{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid rgba(212,80,10,.07);border-right:1px solid rgba(212,80,10,.07);cursor:pointer;transition:.15s}
.upd-item:hover{background:rgba(212,80,10,.04)}
.upd-item:nth-child(even){border-right:none}
.upd-thumb{width:40px;height:54px;background:var(--card);border-radius:3px;flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:18px;border:1px solid rgba(255,255,255,.06)}
.upd-thumb img{width:100%;height:100%;object-fit:cover}
.upd-info{flex:1;min-width:0}
.upd-title{font-size:12px;font-weight:700;color:#fff;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.upd-sub{font-size:10px;color:var(--muted);margin-bottom:3px}
.upd-genres{font-size:9px;color:rgba(212,80,10,.75);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.upd-right{text-align:right;flex-shrink:0}
.upd-ep{font-size:11px;font-weight:700;color:var(--gold);margin-bottom:2px}
.upd-time{font-size:9px;color:var(--muted)}
.upd-type{font-size:8px;font-weight:700;padding:2px 5px;border-radius:2px;margin-top:3px;display:inline-block}
.upd-type.manhwa{background:rgba(232,124,30,.1);color:#e87c1e}
.upd-type.manga{background:rgba(255,165,0,.1);color:#ffa500}
.upd-type.manhua{background:rgba(155,93,229,.1);color:#9b5de5}
.featured-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.featured-card{position:relative;border-radius:4px;overflow:hidden;height:220px;cursor:pointer;background:var(--card);border:1px solid rgba(255,255,255,.06)}
.featured-card img{width:100%;height:100%;object-fit:cover}
.featured-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:56px}
.featured-overlay{position:absolute;inset:0;background:linear-gradient(to right,rgba(0,0,0,.88) 0%,transparent 65%);display:flex;align-items:flex-end;padding:22px}
.featured-genre{font-size:9px;color:var(--red);font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:5px}
.featured-title{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:1px;margin-bottom:6px;color:#fff}
.featured-desc{font-size:11px;color:rgba(255,255,255,.6);line-height:1.5;max-width:240px}
.genre-row{display:flex;gap:8px;flex-wrap:wrap;padding:32px 48px}
.genre-tag{border:1px solid rgba(212,80,10,.15);color:var(--muted);padding:6px 16px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;transition:.15s}
.genre-tag:hover,.genre-tag.active{border-color:var(--red);color:var(--red);background:rgba(212,80,10,.06)}
.loading{display:flex;align-items:center;justify-content:center;padding:32px;color:var(--muted);font-size:12px;grid-column:1/-1}
.loading::after{content:'';width:14px;height:14px;border:1px solid rgba(212,80,10,.35);border-top-color:var(--red);border-radius:50%;animation:spin .8s linear infinite;margin-left:8px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{padding:24px;text-align:center;color:var(--muted);font-size:12px;grid-column:1/-1}
.api-pill{position:fixed;bottom:14px;right:14px;background:var(--card);border:1px solid var(--bdr);padding:6px 12px;font-size:9px;font-weight:700;letter-spacing:1px;color:var(--muted);z-index:1000;display:flex;align-items:center;gap:6px;border-radius:20px;text-transform:uppercase}
.api-dot{width:7px;height:7px;border-radius:50%;background:var(--muted)}
.api-dot.on{background:#ff9b4d;box-shadow:0 0 6px rgba(255,155,77,.5)}
.api-dot.off{background:var(--red)}
footer{border-top:1px solid var(--bdr);padding:32px 48px;display:flex;justify-content:space-between;align-items:center;margin-top:48px}
.footer-logo span{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;color:#fff}
.footer-copy{font-size:11px;color:var(--muted)}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:500;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal-bg.open{display:flex}
.modal{background:#1a0e08;border:1px solid var(--bdr);padding:32px;width:380px;border-radius:6px}
.modal-logo{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;color:#fff;margin-bottom:4px}
.modal-logo em{color:var(--red);font-style:normal}
.modal-sub{font-size:11px;color:var(--muted);margin-bottom:24px;letter-spacing:1px;text-transform:uppercase}
.modal label{display:block;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
.modal input{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:var(--text);padding:10px 14px;font-size:13px;font-family:'Mulish',sans-serif;border-radius:3px;outline:none;margin-bottom:14px;transition:.2s}
.modal input:focus{border-color:rgba(212,80,10,.5)}
.modal-btn{width:100%;background:linear-gradient(135deg,var(--red),#a83000);color:#fff;border:none;padding:11px;font-size:13px;font-weight:700;border-radius:3px;cursor:pointer;margin-bottom:12px}
.modal-switch{text-align:center;font-size:12px;color:var(--muted)}
.modal-switch a{color:var(--red);cursor:pointer;font-weight:700}
.modal-err{background:rgba(255,50,50,.1);border:1px solid rgba(255,50,50,.3);color:#ff6b6b;padding:8px 12px;font-size:12px;border-radius:3px;margin-bottom:12px;display:none}
.modal-close{position:absolute;top:12px;right:12px;background:transparent;border:none;color:var(--muted);font-size:18px;cursor:pointer;line-height:1}
.profile-modal{width:460px}
.profile-header{display:flex;align-items:center;gap:16px;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--bdr)}
.profile-avatar{width:60px;height:60px;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;color:#fff;flex-shrink:0}
.profile-name{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:#fff}
.profile-role{font-size:11px;font-weight:700;letter-spacing:1px}
.profile-stats{display:flex;gap:20px;margin-bottom:20px}
.ps{text-align:center;flex:1;background:rgba(255,255,255,.04);border-radius:4px;padding:12px}
.ps-n{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--gold)}
.ps-l{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.history-list{display:flex;flex-direction:column;gap:6px;max-height:280px;overflow-y:auto}
.hist-item{display:flex;align-items:center;gap:10px;padding:8px 10px;background:rgba(255,255,255,.03);border-radius:3px;cursor:pointer;transition:.12s;border:1px solid rgba(255,255,255,.04)}
.hist-item:hover{background:rgba(212,80,10,.08);border-color:var(--bdr)}
.hist-thumb{width:32px;height:44px;object-fit:cover;border-radius:2px;background:var(--card);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px}
.hist-thumb img{width:100%;height:100%;object-fit:cover;border-radius:2px}
.hist-info{flex:1;min-width:0}
.hist-title{font-size:12px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hist-chap{font-size:10px;color:var(--muted)}
.hist-status{font-size:9px;font-weight:700;padding:2px 6px;border-radius:8px}
.hist-status.reading{background:rgba(59,130,246,.15);color:#60a5fa}
.hist-status.completed{background:rgba(45,158,95,.15);color:#34d399}
.tab-bar{display:flex;gap:0;margin-bottom:14px;border-bottom:1px solid var(--bdr)}
.tb{padding:8px 16px;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:.15s;margin-bottom:-1px}
.tb:hover{color:var(--text)}.tb.on{color:var(--gold);border-bottom-color:var(--red)}
.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(60px);background:#1a0e08;border:1px solid var(--bdr);padding:10px 20px;border-radius:20px;font-size:12px;font-weight:700;z-index:9999;opacity:0;transition:.3s;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.toast.success{border-color:var(--green,#2d9e5f);color:#34d399}
.toast.error{border-color:var(--red);color:#f87171}
.toast.info{border-color:#3b82f6;color:#93c5fd}
</style>
