<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Yönlendiriliyor - Mangasal</title>
    <meta http-equiv="refresh" content="0; url='#'" id="refreshMeta">
    <style>
        body { font-family: Arial; text-align: center; padding: 50px; background: #0d0805; color: white; }
        a { color: #d4500a; }
    </style>
</head>
<body>
    <h2>Yönlendiriliyorsunuz...</h2>
    <p>Eğer otomatik yönlendirilmezseniz <a href="#" id="manualLink">buraya tıklayın</a>.</p>
    <script>
        const params = new URLSearchParams(window.location.search);
        const url = params.get('url');
        if (url && url.startsWith('http')) {
            document.getElementById('refreshMeta').setAttribute('content', '0; url=' + url);
            document.getElementById('manualLink').href = url;
        } else {
            document.body.innerHTML = '<h2>Geçersiz bağlantı</h2><p>Bölüm URL\'si belirtilmemiş.</p><a href="/">Ana Sayfaya Dön</a>';
        }
    </script>
</body>
</html>
