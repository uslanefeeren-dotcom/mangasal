<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Bölümler - Mangasal</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Mulish:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--red:#d4500a;--dark:#0d0805;--card:#150e08;--text:#e0e0e0;--muted:#888;--bdr:rgba(212,80,10,.15)}
body{background:var(--dark);color:var(--text);font-family:'Mulish',sans-serif}
nav{display:flex;align-items:center;gap:16px;padding:0 24px;height:56px;background:rgba(13,8,5,.97);border-bottom:1px solid var(--bdr);position:sticky;top:0;z-index:200}
.nav-logo{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;color:#fff;text-decoration:none}
.nav-logo em{color:var(--red);font-style:normal}
.nav-back{color:var(--muted);text-decoration:none;font-size:12px;font-weight:700;letter-spacing:1px;display:flex;align-items:center;gap:6px}
.nav-back:hover{color:#fff}
.layout{display:flex;gap:0;min-height:calc(100vh - 56px)}
.sidebar{width:300px;flex-shrink:0;background:#0f0906;border-right:1px solid var(--bdr);display:flex;flex-direction:column;position:sticky;top:56px;height:calc(100vh - 56px);overflow:hidden}
.series-info{padding:16px;border-bottom:1px solid var(--bdr);flex-shrink:0}
.series-cover-wrap{display:flex;gap:12px;margin-bottom:12px}
.series-cover{width:64px;height:88px;border-radius:4px;object-fit:cover;background:#150e08;border:1px solid var(--bdr);flex-shrink:0}
.series-cover-ph{width:64px;height:88px;border-radius:4px;background:#150e08;border:1px solid var(--bdr);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.series-meta{flex:1;min-width:0}
.series-title{font-size:13px;font-weight:700;color:#fff;margin-bottom:4px;line-height:1.3}
.series-status{font-size:10px;font-weight:700;padding:2px 8px;border-radius:2px;display:inline-block;margin-bottom:6px}
.s-devam{background:rgba(46,204,64,.15);color:#2ecc40}
.s-tamam{background:rgba(255,165,0,.15);color:#ffa500}
.series-src{font-size:10px;color:var(--muted)}
.chapter-list-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;flex-shrink:0;border-bottom:1px solid var(--bdr)}
.chapter-list-hdr span{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase}
.chapter-list{flex:1;overflow-y:auto;padding:8px 0}
.chap-item{display:flex;align-items:center;justify-content:space-between;padding:9px 16px;cursor:pointer;transition:.15s;border-bottom:1px solid rgba(255,255,255,.03)}
.chap-item:hover{background:rgba(212,80,10,.1)}
.chap-num{font-size:12px;font-weight:700;color:#fff;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chap-date{font-size:10px;color:var(--muted);flex-shrink:0;margin-left:8px}
.loading-box{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;color:var(--muted);gap:12px}
.spinner{width:28px;height:28px;border:3px solid rgba(212,80,10,.2);border-top-color:var(--red);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-box{text-align:center;padding:40px}
.empty-box p{color:var(--muted);margin-bottom:16px}
.btn{background:linear-gradient(135deg,var(--red),#a83000);color:#fff;border:none;padding:6px 14px;border-radius:3px;font-size:11px;font-weight:700;cursor:pointer;text-decoration:none;display:inline-block}
.mobile-menu-btn{display:none}
@media(max-width:700px){
  .mobile-menu-btn{display:block;position:absolute;right:20px;top:15px;background:none;border:none;color:#fff;font-size:20px}
  .sidebar{position:fixed;left:-300px;top:56px;z-index:160;height:calc(100vh - 56px);transition:.25s}
  .sidebar.open{left:0}
}
</style>
</head>
<body>

<nav>
  <a href="/" class="nav-logo">MANGA<em>SAL</em></a>
  <a href="/" class="nav-back">&#8592; Geri</a>
  <div style="flex:1"></div>
  <button class="mobile-menu-btn" onclick="toggleSidebar()">&#9776;</button>
</nav>

<div class="layout">
  <aside class="sidebar" id="sidebar">
    <div class="series-info" id="seriesInfo">
      <div class="loading-box"><div class="spinner"></div></div>
    </div>
    <div class="chapter-list-hdr">
      <span>Bölümler</span>
      <span class="chap-count" id="chapCount"></span>
    </div>
    <div class="chapter-list" id="chapList">
      <div class="loading-box"><div class="spinner"></div></div>
    </div>
  </aside>

  <main style="flex:1; display: flex; align-items: center; justify-content: center; min-height: 60vh;">
    <div class="empty-box">
      <p>📖 Sol panelden bir bölüm seçin,<br>doğrudan kaynak sitede okumak için yönlendirileceksiniz.</p>
    </div>
  </main>
</div>

<script>
const API = '/api';
const params = new URLSearchParams(window.location.search);
const seriesUrl = params.get('series');
let chapters = [];

async function loadSeries() {
  if (!seriesUrl) {
    document.getElementById('seriesInfo').innerHTML = '<div class="empty-box"><p>Geçersiz seri.</p><a href="/" class="btn">Ana Sayfa</a></div>';
    return;
  }
  try {
    // URL'den son parçayı al (slug)
    let slug = seriesUrl;
    if (seriesUrl.includes('/manga/')) {
      slug = seriesUrl.split('/manga/')[1].replace(/\/$/, '');
    }
    const res = await fetch(`${API}/series/${encodeURIComponent(slug)}`);
    const data = await res.json();
    if (data.status !== 'ok') throw new Error('Seri bulunamadı');
    const series = data.data;
    chapters = series.chapters || [];
    renderSeriesInfo(series);
    renderChapters();
  } catch(e) {
    document.getElementById('seriesInfo').innerHTML = `<div class="empty-box"><p>Hata: ${e.message}</p><a href="/" class="btn">Ana Sayfa</a></div>`;
  }
}

function renderSeriesInfo(series) {
  const src = series.cover_url ? `${API}/proxy/image?url=${encodeURIComponent(series.cover_url)}` : '';
  const statusClass = (series.status || '').includes('Tamamlandı') ? 's-tamam' : 's-devam';
  document.getElementById('seriesInfo').innerHTML = `
    <div class="series-cover-wrap">
      ${src ? `<img class="series-cover" src="${src}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" alt="">` : ''}
      <div class="series-cover-ph" style="display:${src ? 'none' : 'flex'}">📖</div>
      <div class="series-meta">
        <div class="series-title">${series.title || '—'}</div>
        <span class="series-status ${statusClass}">${series.status || 'Devam Ediyor'}</span>
        <div class="series-src">${series.source || ''}</div>
      </div>
    </div>
    ${series.description ? `<p style="font-size:11px;color:var(--muted);line-height:1.5;margin-top:8px">${series.description.slice(0,120)}...</p>` : ''}
  `;
  document.getElementById('chapCount').textContent = chapters.length + ' bölüm';
}

function renderChapters() {
  const container = document.getElementById('chapList');
  if (!chapters.length) {
    container.innerHTML = '<div class="empty-box"><p>Bölüm bulunamadı.</p></div>';
    return;
  }
  container.innerHTML = chapters.map((ch, idx) => `
    <div class="chap-item" data-url="${ch.url}">
      <span class="chap-num">${ch.chapter_num || ch.chapter_title || 'Bölüm ' + (idx+1)}</span>
      <span class="chap-date">${(ch.release_date || '').slice(0,10)}</span>
    </div>
  `).join('');
  // Tıklama olayı ekle
  document.querySelectorAll('.chap-item').forEach(el => {
    el.addEventListener('click', () => {
      const url = el.dataset.url;
      if (url) window.location.href = url;
    });
  });
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

loadSeries();
</script>
</body>
</html>
