<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Mangasal — Seri</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Mulish:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--red:#d4500a;--dark:#0d0805;--card:#150e08;--text:#e0e0e0;--muted:#888;--bdr:rgba(212,80,10,.15)}
body{background:var(--dark);color:var(--text);font-family:'Mulish',sans-serif;min-height:100vh}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#0d0805}::-webkit-scrollbar-thumb{background:#6b2800;border-radius:3px}
nav{display:flex;align-items:center;gap:16px;padding:0 24px;height:56px;background:rgba(13,8,5,.97);border-bottom:1px solid var(--bdr);position:sticky;top:0;z-index:200}
.logo{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;color:#fff;text-decoration:none}
.logo em{color:var(--red);font-style:normal}
.back{color:var(--muted);text-decoration:none;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;transition:.2s}
.back:hover{color:#fff}
.layout{max-width:1100px;margin:0 auto;padding:28px 20px;display:flex;gap:24px;align-items:flex-start}
.left{width:220px;flex-shrink:0}
.cover{width:100%;aspect-ratio:2/3;object-fit:cover;border-radius:8px;border:1px solid var(--bdr);display:block;background:#150e08}
.cover-ph{width:100%;aspect-ratio:2/3;border-radius:8px;border:1px solid var(--bdr);background:#150e08;display:flex;align-items:center;justify-content:center;font-size:48px}
.info{margin-top:14px}
.stitle{font-size:16px;font-weight:700;color:#fff;line-height:1.3;margin-bottom:8px}
.badges{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:3px}
.b-devam{background:rgba(46,204,64,.15);color:#2ecc40}
.b-tamam{background:rgba(255,165,0,.15);color:#ffa500}
.b-src{background:rgba(212,80,10,.15);color:#e87c1e}
.b-type{background:rgba(155,93,229,.15);color:#9b5de5}
.desc{font-size:11px;color:var(--muted);line-height:1.6;margin-top:8px}
.site-btn{display:block;width:100%;margin-top:14px;padding:9px;background:linear-gradient(135deg,var(--red),#a83000);color:#fff;border:none;border-radius:4px;font-size:11px;font-weight:700;cursor:pointer;text-align:center;text-decoration:none;letter-spacing:.5px;font-family:'Mulish',sans-serif}
.right{flex:1;min-width:0}
.chap-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--bdr)}
.chap-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;color:#fff}
.chap-cnt{font-size:11px;color:var(--muted)}
.chap-search{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);color:var(--text);padding:6px 12px;font-size:11px;border-radius:3px;outline:none;width:180px;font-family:'Mulish',sans-serif}
.chap-search:focus{border-color:rgba(212,80,10,.4)}
.chap-list{display:flex;flex-direction:column;gap:0}
.chap-item{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;border-bottom:1px solid rgba(255,255,255,.04);cursor:pointer;transition:.15s;border-radius:3px;text-decoration:none;color:inherit}
.chap-item:hover{background:rgba(212,80,10,.1);border-bottom-color:transparent}
.chap-item:hover .cn{color:var(--red)}
.cn{font-size:13px;font-weight:700;color:#fff;flex:1;transition:.15s}
.cd{font-size:10px;color:var(--muted);flex-shrink:0;margin-left:12px}
.ca{font-size:9px;color:var(--red);font-weight:700;margin-left:8px;flex-shrink:0}
.loading{text-align:center;padding:40px;color:var(--muted)}
.spin{width:28px;height:28px;border:3px solid rgba(212,80,10,.2);border-top-color:var(--red);border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:40px;color:var(--muted)}
.empty h3{color:#fff;margin-bottom:8px}
@media(max-width:700px){
  .layout{flex-direction:column;padding:16px 12px;gap:16px}
  .left{width:100%;display:flex;gap:16px;align-items:flex-start}
  .cover,.cover-ph{width:100px;flex-shrink:0}
  .info{margin-top:0;flex:1}
}
</style>
</head>
<body>
<nav>
  <a href="/" class="logo">MANGA<em>SAL</em></a>
  <a href="/" class="back">← Geri</a>
</nav>

<div class="layout">
  <div class="left">
    <div id="coverWrap"><div class="cover-ph">📖</div></div>
    <div class="info" id="info"><div class="loading"><div class="spin"></div></div></div>
  </div>
  <div class="right">
    <div class="chap-hdr">
      <span class="chap-title">BÖLÜMLER</span>
      <div style="display:flex;align-items:center;gap:10px">
        <span class="chap-cnt" id="chapCnt"></span>
        <input class="chap-search" id="chapSearch" type="text" placeholder="Bölüm ara..." oninput="filterChaps(this.value)">
      </div>
    </div>
    <div class="chap-list" id="chapList"><div class="loading"><div class="spin"></div></div></div>
  </div>
</div>

<script>
const API = '/api';
const seriesUrl = new URLSearchParams(location.search).get('series') || '';
let allChaps = [];

async function init(){
  if(!seriesUrl){
    document.getElementById('info').innerHTML='<div class="empty"><h3>Hata</h3><p>Seri bulunamadı.</p></div>';
    document.getElementById('chapList').innerHTML='';
    return;
  }
  try{
    let slug = seriesUrl;
    if(seriesUrl.includes('/manga/')){ slug = seriesUrl.split('/manga/')[1].replace(/\/+$/,''); }
    else{ slug = seriesUrl.replace(/https?:\/\/[^/]+\//,'').replace(/\/+$/,''); }
    const r = await fetch(API+'/series/'+encodeURIComponent(slug));
    const j = await r.json();
    if(j.status!=='ok') throw new Error(j.message||'Bulunamadı');
    const s = j.data;
    allChaps = s.chapters || [];
    renderInfo(s);
    renderChaps(allChaps);
  }catch(e){
    document.getElementById('info').innerHTML=`<div class="empty"><h3>Hata</h3><p>${e.message}</p><a href="/">Ana Sayfa</a></div>`;
    document.getElementById('chapList').innerHTML='';
  }
}

function renderInfo(s){
  const cv = s.cover_url ? API+'/proxy/image?url='+encodeURIComponent(s.cover_url) : '';
  if(cv){
    document.getElementById('coverWrap').innerHTML = `
      <img class="cover" src="${cv}" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <div class="cover-ph" id="coverPh" style="display:none">📖</div>
    `;
  }
  document.title = (s.title||'Seri')+' — Mangasal';
  const isTamam = (s.status||'').toLowerCase().includes('tamamlandı') || s.status==='Tamamlandı';
  document.getElementById('info').innerHTML = `
    <div class="stitle">${s.title||'—'}</div>
    <div class="badges">
      <span class="badge ${isTamam?'b-tamam':'b-devam'}">${s.status||'Devam Ediyor'}</span>
      ${s.source?`<span class="badge b-src">${s.source}</span>`:''}
      ${s.content_type?`<span class="badge b-type">${s.content_type}</span>`:''}
    </div>
    ${s.description?`<div class="desc">${s.description.slice(0,200)}${s.description.length>200?'...':''}</div>`:''}
    <a href="${seriesUrl}" target="_blank" rel="noopener" class="site-btn">Orijinal Sitede Aç ↗</a>
  `;
}

function renderChaps(chaps){
  document.getElementById('chapCnt').textContent = chaps.length+' bölüm';
  if(!chaps.length){
    document.getElementById('chapList').innerHTML = '<div class="empty"><h3>Bölüm bulunamadı</h3><p>Bölümler henüz yüklenmemiş olabilir.</p></div>';
    return;
  }
  document.getElementById('chapList').innerHTML = chaps.map(c => `
    <a class="chap-item" href="${c.url}" target="_blank" rel="noopener">
      <span class="cn">${c.chapter_num || c.chapter_title || '?'}</span>
      <span class="cd">${(c.release_date||'').slice(0,10)}</span>
      <span class="ca">↗</span>
    </a>
  `).join('');
}

function filterChaps(q){
  if(!q){ renderChaps(allChaps); return; }
  const lq = q.toLowerCase();
  renderChaps(allChaps.filter(c => (c.chapter_num || c.chapter_title || '').toLowerCase().includes(lq)));
}

init();
</script>
</body>
</html>
