<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mangasal — Okuyucu</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Mulish:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--red:#d4500a;--orange:#e87c1e;--bg:#0d0805;--card:#150e08;--bdr:rgba(212,80,10,.15);--t:#e0e0e0;--m:#888}
body{background:var(--bg);color:var(--t);font-family:'Mulish',sans-serif;min-height:100vh}
.topbar{display:flex;align-items:center;gap:16px;padding:0 24px;height:52px;background:rgba(13,8,5,.97);border-bottom:1px solid var(--bdr);position:sticky;top:0;z-index:100}
.topbar-logo{display:flex;align-items:center;gap:8px;text-decoration:none;flex-shrink:0}
.topbar-logo img{width:28px;height:28px;border-radius:6px;object-fit:cover}
.topbar-logo span{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;color:#fff}
.topbar-logo em{color:var(--red);font-style:normal}
.back-btn{background:rgba(212,80,10,.1);border:1px solid var(--bdr);color:var(--orange);padding:5px 12px;font-size:11px;font-weight:700;cursor:pointer;border-radius:2px;letter-spacing:.5px;flex-shrink:0}
.back-btn:hover{background:rgba(212,80,10,.2)}
.series-title{font-size:13px;font-weight:700;color:#fff;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chap-nav{display:flex;align-items:center;gap:8px;flex-shrink:0}
.chap-select{background:var(--card);border:1px solid var(--bdr);color:var(--t);padding:5px 10px;font-size:11px;font-family:'Mulish',sans-serif;cursor:pointer;max-width:180px}
.nav-arrow{background:rgba(212,80,10,.1);border:1px solid var(--bdr);color:var(--orange);width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;border-radius:2px;transition:.15s;flex-shrink:0}
.nav-arrow:hover{background:rgba(212,80,10,.3)}
.nav-arrow:disabled{opacity:.3;cursor:not-allowed}
.chap-header{text-align:center;padding:20px;border-bottom:1px solid var(--bdr)}
.chap-header h2{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:var(--orange)}
.chap-header p{font-size:11px;color:var(--m);margin-top:4px}
.reader{max-width:800px;margin:0 auto;padding:0}
.reader-img-wrap{display:flex;flex-direction:column;align-items:center;gap:2px}
.reader-img{width:100%;display:block;line-height:0}
.reader-img img{width:100%;height:auto;display:block}
.bottom-nav{display:flex;align-items:center;justify-content:center;gap:16px;padding:24px;border-top:1px solid var(--bdr);margin-top:8px}
.bottom-btn{background:linear-gradient(135deg,var(--red),#a83000);color:#fff;border:none;padding:11px 28px;font-size:13px;font-weight:700;border-radius:3px;cursor:pointer}
.bottom-btn:disabled{opacity:.3;cursor:not-allowed;background:var(--card)}
.bottom-btn.ghost{background:transparent;border:1px solid var(--bdr);color:var(--t)}
.state-box{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:50vh;gap:16px;color:var(--m)}
.state-box .icon{font-size:48px}
.state-box h3{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:2px;color:var(--orange)}
.state-box p{font-size:13px;text-align:center;max-width:320px;line-height:1.7}
.spinner{width:36px;height:36px;border:2px solid rgba(212,80,10,.2);border-top-color:var(--red);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.series-panel{max-width:800px;margin:0 auto;padding:24px;border-bottom:1px solid var(--bdr)}
.series-panel-inner{display:flex;gap:20px;align-items:flex-start}
.series-cover{width:80px;height:110px;object-fit:cover;border-radius:3px;flex-shrink:0;border:1px solid var(--bdr)}
.series-info h1{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;margin-bottom:6px}
.series-genres{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.genre-tag{background:rgba(212,80,10,.1);border:1px solid var(--bdr);color:var(--orange);font-size:9px;font-weight:700;padding:2px 8px;border-radius:2px;letter-spacing:.5px;text-transform:uppercase}
.series-desc{font-size:12px;color:var(--m);line-height:1.7;max-width:500px}
.chap-list{max-width:800px;margin:0 auto;padding:0 24px 24px}
.chap-list-header{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;margin-bottom:12px;padding-top:20px;color:var(--orange)}
.chap-items{display:flex;flex-direction:column;gap:2px;max-height:400px;overflow-y:auto}
.chap-items::-webkit-scrollbar{width:4px}
.chap-items::-webkit-scrollbar-track{background:var(--card)}
.chap-items::-webkit-scrollbar-thumb{background:var(--red);border-radius:2px}
.chap-item{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--card);border:1px solid rgba(255,255,255,.04);cursor:pointer;transition:.15s;border-radius:2px}
.chap-item:hover{background:rgba(212,80,10,.08);border-color:var(--bdr)}
.chap-item.active{background:rgba(212,80,10,.15);border-color:rgba(212,80,10,.4)}
.chap-num{font-size:13px;font-weight:700;color:#fff}
.chap-date{font-size:10px;color:var(--m)}
.read-btn{background:rgba(212,80,10,.15);color:var(--orange);border:1px solid var(--bdr);padding:3px 10px;font-size:10px;font-weight:700;border-radius:2px;cursor:pointer}
</style>
</head>

<div id="mainContent">
  <div class="state-box">
    <div class="spinner"></div>
    <h3>Yükleniyor</h3>
    <p>Seri bilgileri getiriliyor...</p>
  </div>
</div>

<script>
// API base URL - GÖRECELİ (Railway'de çalışır)
const API = '/api';
const authToken = localStorage.getItem('vs_token');

// URL parametrelerini oku
const params = new URLSearchParams(window.location.search);
let seriesUrl = params.get('series') || '';
let chapUrl = params.get('chapter') || '';
let seriesData = null;
let allChapters = [];
let currentChapIdx = -1;

// ── API ──────────────────────────────────────
async function apiFetch(ep, opts={}) {
  try {
    const headers = {'Content-Type':'application/json'};
    if (authToken) headers['Authorization'] = 'Bearer '+authToken;
    const r = await fetch(API + ep, {signal:AbortSignal.timeout(20000), headers, ...opts});
    if (!r.ok) throw new Error(r.status);
    return await r.json();
  } catch(e) {
    console.error('API:', e);
    return null;
  }
}

// Proxy ile resim URL'sini düzenle
function proxyImage(url) {
  if (!url) return '';
  if (url.startsWith('data:') || url.startsWith('/')) return url;
  if (url.includes('/proxy/image')) return url;
  return `${API}/proxy/image?url=${encodeURIComponent(url)}`;
}

// URL'den slug cikar
function extractSlug(url) {
  if (!url) return '';
  url = decodeURIComponent(url);
  if (url.includes('/')) {
    return url.replace(/\/+$/, '').split('/').pop();
  }
  return url;
}

function decodeHtml(html) {
  const txt = document.createElement('textarea');
  txt.innerHTML = html;
  return txt.value;
}

// ── SERİ BİLGİSİ YÜKLEMESİ ──────────────────
async function loadSeries() {
  if (!seriesUrl) {
    showError('Seri bulunamadı', 'URL parametresi eksik. Ana sayfadan bir seriye tıklayın.');
    return;
  }

  const slug = extractSlug(seriesUrl);
  const data = await apiFetch('/series/' + encodeURIComponent(slug));

  if (!data) {
    showError('API Baglantisi Yok', 'Scraper calismiyor olabilir.');
    return;
  }
  
  if (data.status === 'error') {
    showError('Seri Bulunamadi', 'Bu seri veritabaninda yok: ' + slug);
    return;
  }
  
  if (!data.data) {
    showError('Seri yuklenemedi', 'API baglantisi kontrol edin.');
    return;
  }

  seriesData = data.data;
  seriesData.title = decodeHtml(seriesData.title || '');
  seriesData.description = decodeHtml(seriesData.description || '');
  
  allChapters = (seriesData.chapters || []).map(ch => ({
    ...ch,
    chapter_title: decodeHtml(ch.chapter_title || ch.chapter_num || ''),
    chapter_num: decodeHtml(ch.chapter_num || '')
  }));

  document.getElementById('topSeriesTitle').textContent = seriesData.title;
  document.title = seriesData.title + ' — Mangasal';

  if (chapUrl) {
    currentChapIdx = allChapters.findIndex(c => c.url === chapUrl);
    if (currentChapIdx === -1) currentChapIdx = 0;
    loadChapter(chapUrl);
  } else {
    showSeriesPage();
  }
}

// ── SERİ SAYFASI ─────────────────────────────
function showSeriesPage() {
  const s = seriesData;
  const genres = (s.genres || []).map(g => `<span class="genre-tag">${g}</span>`).join('');

  const chapterItems = allChapters.map((ch, i) => `
    <div class="chap-item" onclick="openChapter('${ch.url}')">
      <div>
        <div class="chap-num">${ch.chapter_title || ch.chapter_num}</div>
        <div class="chap-date">${ch.release_date || ''}</div>
      </div>
      <button class="read-btn">Oku →</button>
    </div>
  `).join('');

  document.getElementById('mainContent').innerHTML = `
    <div class="series-panel">
      <div class="series-panel-inner">
        ${s.cover_url
          ? `<img class="series-cover" src="${proxyImage(s.cover_url)}" alt="${s.title}">`
          : '<div style="width:80px;height:110px;background:#1a0a02;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0">📖</div>'}
        <div class="series-info">
          <h1>${s.title}</h1>
          <div class="series-genres">${genres}</div>
          <div class="series-desc">${s.description || 'Açıklama yok.'}</div>
        </div>
      </div>
    </div>
    <div class="chap-list">
      <div class="chap-list-header">Bölümler (${allChapters.length})</div>
      <div class="chap-items">${chapterItems}</div>
    </div>
  `;

  document.getElementById('chapSelect').style.display = 'none';
  document.getElementById('prevBtn').style.display = 'none';
  document.getElementById('nextBtn').style.display = 'none';
}

function openChapter(url) {
  chapUrl = url;
  currentChapIdx = allChapters.findIndex(c => c.url === url);
  loadChapter(url);
}

// ── BÖLÜM OKUMA ──────────────────────────────
async function loadChapter(url) {
  document.getElementById('mainContent').innerHTML = `
    <div class="state-box">
      <div class="spinner"></div>
      <h3>Bolum Yukleniyor</h3>
      <p>Resimler getiriliyor, lutfen bekleyin...</p>
    </div>
  `;

  fillChapterSelect();
  updateNavButtons();

  const data = await apiFetch('/chapter/images?url=' + encodeURIComponent(url));

  if (!data || !data.images || data.images.length === 0) {
    document.getElementById('mainContent').innerHTML = `
      <div class="state-box">
        <div class="icon">😞</div>
        <h3>Resimler Yüklenemedi</h3>
        <p>Bu bölümün resimleri çekilemedi. Kaynak siteye erişim sorunu olabilir.</p>
        <button class="bottom-btn" onclick="loadChapter('${url}')">Tekrar Dene</button>
      </div>
    `;
    return;
  }

  const ch = allChapters[currentChapIdx];
  const chapTitle = ch ? (ch.chapter_title || ch.chapter_num) : 'Bölüm';

  const imgItems = data.images.map((src, i) => `
    <div class="reader-img">
      <img src="${proxyImage(src)}" alt="Sayfa ${i+1}" loading="${i < 3 ? 'eager' : 'lazy'}" onerror="this.style.display='none'">
    </div>
  `).join('');

  document.getElementById('mainContent').innerHTML = `
    <div class="chap-header">
      <h2>${seriesData ? seriesData.title : ''}</h2>
      <p>${chapTitle} — ${data.count} sayfa</p>
    </div>
    <div class="reader">
      <div class="reader-img-wrap">${imgItems}</div>
    </div>
    <div class="bottom-nav">
      <button class="bottom-btn ghost" onclick="nextChapter()" id="bottomPrev">‹ Önceki</button>
      <button class="bottom-btn" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑ Başa Dön</button>
      <button class="bottom-btn" onclick="prevChapter()" id="bottomNext">Sonraki ›</button>
    </div>
  `;

  const newUrl = `${window.location.pathname}?series=${encodeURIComponent(seriesUrl)}&chapter=${encodeURIComponent(url)}`;
  window.history.pushState(null, '', newUrl);

  if (seriesData) {
    saveReadingProgress(seriesUrl, url, ch ? (ch.chapter_title || ch.chapter_num) : '', seriesData.title || '', seriesData.cover_url || '');
  }

  window.scrollTo({top:0, behavior:'smooth'});
  updateNavButtons();
}

// ── BÖLÜM NAVIGASYONU ────────────────────────
function fillChapterSelect() {
  const sel = document.getElementById('chapSelect');
  sel.style.display = 'block';
  sel.innerHTML = allChapters.map((ch, i) =>
    `<option value="${ch.url}" ${i===currentChapIdx?'selected':''}>${ch.chapter_title || ch.chapter_num}</option>`
  ).join('');
}

function updateNavButtons() {
  const hasPrev = currentChapIdx < allChapters.length - 1;
  const hasNext = currentChapIdx > 0;

  const prev = document.getElementById('prevBtn');
  const next = document.getElementById('nextBtn');
  const bottomPrev = document.getElementById('bottomPrev');
  const bottomNext = document.getElementById('bottomNext');

  if (prev) { prev.disabled = !hasPrev; prev.style.display = 'flex'; }
  if (next) { next.disabled = !hasNext; next.style.display = 'flex'; }
  if (bottomPrev) bottomPrev.disabled = !hasPrev;
  if (bottomNext) bottomNext.disabled = !hasNext;
}

function prevChapter() {
  if (currentChapIdx < allChapters.length - 1) {
    currentChapIdx++;
    chapUrl = allChapters[currentChapIdx].url;
    loadChapter(chapUrl);
  }
}

function nextChapter() {
  if (currentChapIdx > 0) {
    currentChapIdx--;
    chapUrl = allChapters[currentChapIdx].url;
    loadChapter(chapUrl);
  }
}

function goToChapter(url) {
  chapUrl = url;
  currentChapIdx = allChapters.findIndex(c => c.url === url);
  loadChapter(url);
}

function goBack() {
  window.location.href = '/';
}

function showSeries() {
  chapUrl = '';
  currentChapIdx = -1;
  const newUrl = `${window.location.pathname}?series=${encodeURIComponent(seriesUrl)}`;
  window.history.pushState(null, '', newUrl);
  if (seriesData && allChapters.length > 0) {
    showSeriesPage();
  } else {
    loadSeries();
  }
}

function showError(title, msg) {
  document.getElementById('mainContent').innerHTML = `
    <div class="state-box">
      <div class="icon">⚠️</div>
      <h3>${title}</h3>
      <p>${msg}</p>
      <a href="/"><button class="bottom-btn">Ana Sayfaya Dön</button></a>
    </div>
  `;
}

// Site ayarlarını yükle
async function loadReaderSettings() {
  const data = await apiFetch('/settings');
  if (!data || !data.data) return;
  const d = data.data;
  const p1 = d.site_name_part1 || 'MANGA';
  const p2 = d.site_name_part2 || 'SAL';
  const nc = d.name_color || '#d4500a';
  const logoEl = document.querySelector('.topbar-logo span');
  if (logoEl) logoEl.innerHTML = `${p1}<em style="color:${nc};font-style:normal">${p2}</em>`;
  if (d.site_logo) {
    const imgEl = document.querySelector('.topbar-logo img');
    if (imgEl) imgEl.src = proxyImage(d.site_logo);
  }
  if (d.primary_color) {
    const style = document.createElement('style');
    style.textContent = `:root{--red:${d.primary_color};--orange:${d.primary_color}}`;
    document.head.appendChild(style);
  }
}

// Okuma ilerlemesini kaydet
async function saveReadingProgress(seriesUrl, chapUrl, chapNum, seriesTitle, seriesCover) {
  if (!authToken) return;
  await apiFetch('/user/progress', {
    method: 'POST',
    body: JSON.stringify({
      series_url: seriesUrl,
      last_chapter_url: chapUrl,
      last_chapter_num: chapNum,
      status: 'reading',
      series_title: seriesTitle,
      series_cover: seriesCover
    })
  });
}

loadReaderSettings();
loadSeries();
</script>
