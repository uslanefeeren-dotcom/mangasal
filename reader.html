<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Okuyucu — Mangasal</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Mulish:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--red:#d4500a;--dark:#0d0805;--card:#150e08;--text:#e0e0e0;--muted:#888;--bdr:rgba(212,80,10,.15)}
body{background:var(--dark);color:var(--text);font-family:'Mulish',sans-serif;min-height:100vh}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#0d0805}
::-webkit-scrollbar-thumb{background:#6b2800;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--red)}
nav{display:flex;align-items:center;gap:16px;padding:0 24px;height:56px;background:rgba(13,8,5,.97);border-bottom:1px solid var(--bdr);position:sticky;top:0;z-index:200}
.nav-logo{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;color:#fff;text-decoration:none}
.nav-logo em{color:var(--red);font-style:normal}
.nav-back{color:var(--muted);text-decoration:none;font-size:12px;font-weight:700;letter-spacing:1px;display:flex;align-items:center;gap:6px;transition:.2s}
.nav-back:hover{color:#fff}
.layout{display:flex;gap:0;min-height:calc(100vh - 56px)}
.sidebar{width:300px;flex-shrink:0;background:#0f0906;border-right:1px solid var(--bdr);display:flex;flex-direction:column;position:sticky;top:56px;height:calc(100vh - 56px);overflow:hidden}
.series-info{padding:16px;border-bottom:1px solid var(--bdr);flex-shrink:0}
.series-cover-wrap{display:flex;gap:12px;margin-bottom:12px}
.series-cover{width:64px;height:88px;border-radius:4px;object-fit:cover;background:#150e08;border:1px solid var(--bdr);flex-shrink:0}
.series-cover-ph{width:64px;height:88px;border-radius:4px;background:#150e08;border:1px solid var(--bdr);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.series-meta{flex:1;min-width:0}
.series-title{font-size:13px;font-weight:700;color:#fff;margin-bottom:4px;line-height:1.3}
.series-status{font-size:10px;font-weight:700;padding:2px 8px;border-radius:2px;display:inline-block;margin-bottom:6px}
.s-devam{background:rgba(46,204,64,.15);color:#2ecc40}
.s-tamam{background:rgba(255,165,0,.15);color:#ffa500}
.series-src{font-size:10px;color:var(--muted)}
.chapter-list-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;flex-shrink:0;border-bottom:1px solid var(--bdr)}
.chapter-list-hdr span{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase}
.chap-count{font-size:10px;color:var(--muted)}
.chapter-list{flex:1;overflow-y:auto;padding:8px 0}
.chap-item{display:flex;align-items:center;justify-content:space-between;padding:9px 16px;cursor:pointer;transition:.15s;border-bottom:1px solid rgba(255,255,255,.03)}
.chap-item:hover{background:rgba(212,80,10,.1)}
.chap-item.active{background:rgba(212,80,10,.2);border-left:2px solid var(--red)}
.chap-num{font-size:12px;font-weight:700;color:#fff;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chap-date{font-size:10px;color:var(--muted);flex-shrink:0;margin-left:8px}
.chap-item.active .chap-num{color:var(--red)}
.reader-area{flex:1;min-width:0;display:flex;flex-direction:column}
.reader-topbar{padding:12px 24px;background:#0f0906;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:12px;flex-shrink:0}
.reader-chap-title{font-size:13px;font-weight:700;color:#fff;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.btn-nav{background:rgba(212,80,10,.15);color:var(--red);border:1px solid rgba(212,80,10,.3);padding:6px 14px;border-radius:3px;font-size:11px;font-weight:700;cursor:pointer;transition:.2s;letter-spacing:.5px;white-space:nowrap}
.btn-nav:hover:not(:disabled){background:rgba(212,80,10,.3)}
.btn-nav:disabled{opacity:.35;cursor:not-allowed}
.reader-content{flex:1;overflow-y:auto;padding:16px 0;background:var(--dark)}
.page-img{display:block;margin:0 auto 4px;max-width:800px;width:100%}
.loading-box{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;color:var(--muted);gap:12px}
.spinner{width:36px;height:36px;border:3px solid rgba(212,80,10,.2);border-top-color:var(--red);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-box{text-align:center;padding:60px 20px}
.empty-box h3{font-size:16px;color:#fff;margin-bottom:8px}
.empty-box p{font-size:12px;color:var(--muted);line-height:1.6;max-width:320px;margin:0 auto 16px}
.empty-box a,.ext-btn{color:#fff;text-decoration:none;display:inline-flex;align-items:center;gap:6px;background:linear-gradient(135deg,var(--red),#a83000);padding:8px 18px;border-radius:3px;font-size:12px;font-weight:700;cursor:pointer;border:none;margin-top:4px}
.scroll-notice{text-align:center;padding:24px 20px 40px;border-top:1px solid var(--bdr);margin-top:12px}
.mobile-menu-btn{display:none;align-items:center;justify-content:center;width:34px;height:34px;background:rgba(212,80,10,.15);border:1px solid rgba(212,80,10,.3);border-radius:3px;color:var(--red);cursor:pointer;font-size:16px}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:150}
.sidebar-overlay.open{display:block}
@media(max-width:700px){
  .mobile-menu-btn{display:flex}
  .sidebar{position:fixed;left:-300px;top:56px;z-index:160;height:calc(100vh - 56px);transition:.25s;display:flex}
  .sidebar.open{left:0}
  .reader-topbar{padding:8px 12px}
  .page-img{max-width:100%}
}
</style>
</head>
<body>

<nav>
  <a href="/" class="nav-logo">MANGA<em>SAL</em></a>
  <a href="/" class="nav-back">&#8592; Geri</a>
  <div style="flex:1"></div>
  <button class="mobile-menu-btn" onclick="toggleSidebar()">&#9776;</button>
</nav>

<div class="sidebar-overlay" id="overlay" onclick="closeSidebar()"></div>

<div class="layout">
  <aside class="sidebar" id="sidebar">
    <div class="series-info" id="seriesInfo">
      <div class="loading-box"><div class="spinner"></div></div>
    </div>
    <div class="chapter-list-hdr">
      <span>Bolumler</span>
      <span class="chap-count" id="chapCount"></span>
    </div>
    <div class="chapter-list" id="chapList">
      <div class="loading-box"><div class="spinner"></div></div>
    </div>
  </aside>

  <main class="reader-area">
    <div class="reader-topbar" id="topbar" style="display:none">
      <button class="btn-nav" id="btnPrev" onclick="nav(-1)" disabled>&#8592; Onceki</button>
      <span class="reader-chap-title" id="chapTitle">—</span>
      <button class="btn-nav" id="btnNext" onclick="nav(1)" disabled>Sonraki &#8594;</button>
    </div>
    <div class="reader-content" id="readerContent">
      <div class="empty-box">
        <h3>&#128218; Bolum secin</h3>
        <p>Sol panelden okumak istediginiz bolume tiklayin.</p>
      </div>
    </div>
  </main>
</div>

<script>
const API='/api';
const p=new URLSearchParams(location.search);
const SURL=p.get('series')||'';
const CURL=p.get('chapter')||'';
let seriesData=null,chapters=[],curIdx=-1;

async function init(){
  if(!SURL){
    document.getElementById('seriesInfo').innerHTML='<div class="empty-box"><h3>Hata</h3><p>Seri URL eksik.</p><a href="/">Ana Sayfa</a></div>';
    document.getElementById('chapList').innerHTML='';
    return;
  }
  try{
    // slug olarak son parçayı kullan
    const slug=SURL.replace(/https?:\/\/[^/]+\/manga\//,'').replace(/\/+$/,'');
    const r=await fetch(`${API}/series/${encodeURIComponent(slug)}`);
    const j=await r.json();
    if(j.status!=='ok') throw new Error(j.message||'API hatasi');
    seriesData=j.data;
    chapters=seriesData.chapters||[];
    renderInfo();
    renderList();
    if(CURL){
      const i=chapters.findIndex(c=>c.url===CURL);
      if(i>=0) loadChap(i);
    }
  }catch(e){
    document.getElementById('seriesInfo').innerHTML=`<div class="empty-box"><h3>Yuklenemedi</h3><p>${e.message}</p><a href="/">Ana Sayfa</a></div>`;
    document.getElementById('chapList').innerHTML='';
  }
}

function renderInfo(){
  const s=seriesData;
  const sc=s.status||'';
  const st=sc.includes('Tamamlandi')||sc.includes('Tamamlandı')?'s-tamam':'s-devam';
  const src=s.cover_url?`${API}/proxy/image?url=${encodeURIComponent(s.cover_url)}`:'';
  document.title=(s.title||'Okuyor')+'  — Mangasal';
  document.getElementById('seriesInfo').innerHTML=`
    <div class="series-cover-wrap">
      ${src?`<img class="series-cover" src="${src}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" alt="">`:``}
      <div class="series-cover-ph" style="display:${src?'none':'flex'}">&#128218;</div>
      <div class="series-meta">
        <div class="series-title">${s.title||'—'}</div>
        <span class="series-status ${st}">${sc||'Devam Ediyor'}</span>
        <div class="series-src">${s.source||''}</div>
      </div>
    </div>
    ${s.description?`<p style="font-size:11px;color:var(--muted);line-height:1.5;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden">${s.description}</p>`:''}
  `;
}

function renderList(){
  document.getElementById('chapCount').textContent=chapters.length+' bolum';
  if(!chapters.length){
    document.getElementById('chapList').innerHTML=`<div class="empty-box"><p>Bolum bulunamadi.</p>${seriesData?.url?`<a href="${seriesData.url}" target="_blank" class="ext-btn">Siteye Git</a>`:''}</div>`;
    return;
  }
  document.getElementById('chapList').innerHTML=chapters.map((c,i)=>`
    <div class="chap-item" id="ci${i}" onclick="loadChap(${i})">
      <span class="chap-num">${c.chapter_num||c.chapter_title||'?'}</span>
      <span class="chap-date">${(c.release_date||'').slice(0,10)}</span>
    </div>`).join('');
}

async function loadChap(idx){
  if(idx<0||idx>=chapters.length) return;
  curIdx=idx;
  const c=chapters[idx];
  document.querySelectorAll('.chap-item').forEach(el=>el.classList.remove('active'));
  const el=document.getElementById('ci'+idx);
  if(el){el.classList.add('active');el.scrollIntoView({block:'nearest'});}
  document.getElementById('topbar').style.display='flex';
  document.getElementById('chapTitle').textContent=c.chapter_num||c.chapter_title||'?';
  document.getElementById('btnPrev').disabled=idx>=chapters.length-1;
  document.getElementById('btnNext').disabled=idx<=0;
  history.replaceState(null,'',`?series=${encodeURIComponent(SURL)}&chapter=${encodeURIComponent(c.url)}`);
  document.getElementById('readerContent').innerHTML='<div class="loading-box"><div class="spinner"></div><span>Yukleniyor...</span></div>';
  closeSidebar();
  try{
    const r=await fetch(`${API}/chapter/images?url=${encodeURIComponent(c.url)}`);
    const j=await r.json();
    if(j.status!=='ok') throw new Error('Resimler alinamadi');
    const imgs=j.images||[];
    if(!imgs.length){
      document.getElementById('readerContent').innerHTML=`
        <div class="empty-box">
          <h3>Resimler yuklenemedi</h3>
          <p>Bu bolumun resimleri cekilemedi. Asil siteden okuyabilirsiniz.</p>
          <a href="${c.url}" target="_blank" rel="noopener" class="ext-btn">Orijinal Sitede Oku</a>
        </div>`;
      return;
    }
    document.getElementById('readerContent').innerHTML=
      imgs.map((u,i)=>`<img class="page-img" src="${API}/proxy/image?url=${encodeURIComponent(u)}" alt="Sayfa ${i+1}" loading="${i<3?'eager':'lazy'}" onerror="this.style.cssText='display:block;padding:16px;text-align:center;color:#666;font-size:11px';this.alt='Yuklenemedi'">`).join('')+
      `<div class="scroll-notice">${idx>0?`<button class="ext-btn" onclick="nav(1)">Sonraki Bolum &#8594;</button>`:'<span style="color:var(--muted);font-size:12px">Son bolum</span>'}</div>`;
    document.getElementById('readerContent').scrollTop=0;
  }catch(e){
    document.getElementById('readerContent').innerHTML=`
      <div class="empty-box">
        <h3>Hata</h3><p>${e.message}</p>
        <a href="${c.url}" target="_blank" rel="noopener" class="ext-btn">Orijinal Sitede Oku</a>
      </div>`;
  }
}

function nav(d){const ni=curIdx+d;if(ni>=0&&ni<chapters.length)loadChap(ni);}
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('overlay').classList.toggle('open');}
function closeSidebar(){document.getElementById('sidebar').classList.remove('open');document.getElementById('overlay').classList.remove('open');}

init();
</script>
</body>
</html>
